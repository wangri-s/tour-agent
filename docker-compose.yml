# =============================================================================
# tour-agent — 三层记忆系统 + 向量数据库
# =============================================================================
#
# 启动: docker compose up -d
# 停止: docker compose down
# 清理: docker compose down -v
#
# 端口:
#   App     : 8000
#   Milvus  : 19530 (gRPC), 9091 (metrics)
#   MinIO   : 9000 (S3 API), 9001 (Console)
#   Etcd    : 2379
#   Redis   : 6379
#   Kafka   : 9092
#   MySQL   : 3306
# =============================================================================

services:

  # ===========================================================================
  # Etcd — Milvus 元数据存储
  # ===========================================================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: tourai-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - tourai-net

  # ===========================================================================
  # MinIO — Milvus 对象存储
  # ===========================================================================
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: tourai-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "sh", "-c", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - tourai-net

  # ===========================================================================
  # Milvus — 向量数据库 (RAG 检索引擎)
  # ===========================================================================
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: tourai-milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    command: milvus run standalone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 60s
    networks:
      - tourai-net

  # ===========================================================================
  # Redis — 短时记忆层
  # ===========================================================================
  redis:
    image: redis:7.2-alpine
    container_name: tourai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./deploy/redis.conf:/usr/local/etc/redis/redis.conf
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tourai-net

  # ===========================================================================
  # Kafka — 工作记忆层
  # ===========================================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tourai-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "0000000000000000000001"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - tourai-net

  # ===========================================================================
  # MySQL — 长时记忆层
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: tourai-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: tourai123
      MYSQL_DATABASE: tourai
      MYSQL_USER: tourai
      MYSQL_PASSWORD: tourai123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptourai123"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tourai-net

  # ===========================================================================
  # PostgreSQL — LangGraph Checkpoint 持久化
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: tourai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tourai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tourai-net

  # ===========================================================================
  # App — tour-agent FastAPI 服务
  # ===========================================================================
  app:
    build: .
    container_name: tourai-app
    depends_on:
      milvus:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MYSQL_URL=mysql://tourai:tourai123@mysql:3306/tourai
    ports:
      - "8000:8000"
    networks:
      - tourai-net
    restart: unless-stopped

# =============================================================================
# Volumes
# =============================================================================
volumes:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
  kafka_data:
  postgres_data:
  mysql_data:

# =============================================================================
# Networks
# =============================================================================
networks:
  tourai-net:
    driver: bridge
