# =============================================================================
# tour-agent 基础设施 —— 三层记忆系统 + 向量数据库
# =============================================================================
#
# 启动: docker compose up -d
# 停止: docker compose down
# 清理数据: docker compose down -v
#
# 服务端口:
#   Milvus  : 19530 (gRPC), 9091 (metrics)
#   Redis   : 6379
#   Kafka   : 9092 (内部), 9093 (外部)
#   MySQL   : 3306
#   Etcd    : 2379 (Milvus 元数据)
#   MinIO   : 9000 (Milvus 对象存储 API), 9001 (Console)
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # Milvus 向量数据库 + 依赖 (Etcd + MinIO)
  # ===========================================================================

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: tourai-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - tourai-net

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: tourai-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - tourai-net

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: tourai-milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    command: milvus run standalone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
    networks:
      - tourai-net

  # ===========================================================================
  # Redis — 短时记忆层 (Short-term Memory)
  # ===========================================================================

  redis:
    image: redis:7.2-alpine
    container_name: tourai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./deploy/redis.conf:/usr/local/etc/redis/redis.conf
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tourai-net

  # ===========================================================================
  # Kafka — 工作记忆层 (Working Memory)
  # ===========================================================================

  kafka:
    image: bitnami/kafka:3.6
    container_name: tourai-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Topic auto-creation
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - tourai-net

  # Kafka UI (可选，调试用)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tourai-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - tourai-net

  # ===========================================================================
  # MySQL — 长时记忆层 (Long-term Memory)
  # ===========================================================================

  mysql:
    image: mysql:8.0
    container_name: tourai-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: tourai123
      MYSQL_DATABASE: tourai
      MYSQL_USER: tourai
      MYSQL_PASSWORD: tourai123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_allowed_packet=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptourai123"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tourai-net

# =============================================================================
# Volumes
# =============================================================================

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
  kafka_data:
  mysql_data:

# =============================================================================
# Networks
# =============================================================================

networks:
  tourai-net:
    driver: bridge
