# =============================================================================
# tour-agent 统一配置文件
# =============================================================================
# 所有配置集中管理：LLM、数据库、记忆系统、Prompt、旅行社。
# 支持 ${ENV_VAR:-default} 语法读取环境变量。
# 修改后 POST /admin/prompts/reload 热加载，无需重启。
# =============================================================================

# ---------------------------------------------------------------------------
# 全局设置
# ---------------------------------------------------------------------------
settings:
  version: "0.5.1"
  debug: ${TOUR_AGENT_DEBUG:-false}
  project_name: tour-agent

# ---------------------------------------------------------------------------
# LLM 模型配置
# ---------------------------------------------------------------------------
llm:
  provider: dashscope
  api_key: ${DASHSCOPE_API_KEY}
  base_url: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}

  models:
    default: ${LLM_MODEL:-qwen-plus}
    planner: qwen-max          # 旅游定制 (复杂推理)
    router: qwen-turbo         # 意图路由 (轻量快速)
    compressor: qwen-turbo     # 上下文压缩

  params:
    default_temperature: 0.7
    router_temperature: 0.1    # 路由需要低温度保证一致性
    default_max_tokens: 4096
    planner_max_tokens: 8000   # 行程生成需要更多输出空间
    compressor_max_tokens: 500

# ---------------------------------------------------------------------------
# Embedding 配置
# ---------------------------------------------------------------------------
embedding:
  provider: dashscope
  model: text-embedding-v3
  dimensions: 1024
  batch_size: 25

# ---------------------------------------------------------------------------
# Milvus 向量数据库
# ---------------------------------------------------------------------------
milvus:
  host: ${MILVUS_HOST:-localhost}
  port: ${MILVUS_PORT:-19530}
  collection: travel_knowledge
  metric_type: COSINE
  index_type: IVF_FLAT
  nlist: 128

# ---------------------------------------------------------------------------
# Redis 短时记忆
# ---------------------------------------------------------------------------
redis:
  host: ${REDIS_HOST:-localhost}
  port: ${REDIS_PORT:-6379}
  db: 0
  password: ${REDIS_PASSWORD:-}
  key_prefix: tourai

  # TTL 配置 (秒)
  ttl:
    session: 1800        # 会话上下文 (30min)
    customer: 86400      # 客户画像 (24h)
    rate_limit: 60       # 频率限制窗口 (1min)
    agent_state: 300     # Agent 临时状态 (5min)
    tool_cache: 600      # 工具缓存 (10min)
    trip_draft: 3600     # 行程草稿 (1h)
    lock: 30             # 分布式锁 (30s)
    mid_term: 86400      # 中期摘要 (24h, 过期从MySQL恢复)
    round: 86400         # 轮次计数器 (24h, 过期从MySQL恢复)

# ---------------------------------------------------------------------------
# MySQL 长时记忆
# ---------------------------------------------------------------------------
mysql:
  url: ${MYSQL_URL:-mysql://tourai:tourai123@localhost:3306/tourai}
  charset: utf8mb4
  pool_size: 5
  host: localhost
  port: ${MYSQL_PORT:-3307}
  user: ${MYSQL_USER:-root}
  password: ${MYSQL_PASSWORD:-tourai123}
  database: ${MYSQL_DATABASE:-tourai}

# ---------------------------------------------------------------------------
# Kafka 工作记忆
# ---------------------------------------------------------------------------
kafka:
  bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:29092}
  topics:
    agent_events: agent-events
    trip_tasks: trip-tasks
    crm_sync: crm-sync
    capi_send: capi-send
    analytics: analytics
    notifications: notifications

# ---------------------------------------------------------------------------
# Postgres (LangGraph Checkpoint)
# ---------------------------------------------------------------------------
postgres:
  url: ${POSTGRES_URL:-postgresql://postgres:postgres@localhost:5432/tourai}
  enabled: ${POSTGRES_ENABLED:-false}

# ---------------------------------------------------------------------------
# 三层记忆系统
# ---------------------------------------------------------------------------
memory:
  # 短期记忆 — Redis
  short_term:
    max_messages: 50           # 每个会话最多保留消息数

  # 中期记忆 — Redis+MySQL 联合
  mid_term:
    enabled: true
    compress_interval: 5       # 每 N 轮触发一次摘要压缩
    max_summaries: 5           # Redis 中最多保留的摘要段数
    summary_max_chars: 300     # 摘要最大字符数
    compress_model: qwen-turbo # 压缩使用的模型

  # 上下文压缩 — 防止超出 LLM 窗口
  context_compression:
    enabled: true
    model_context_window: 8000    # qwen-max 8K 上下文窗口
    compress_ratio: 0.65          # 窗口 65% 给输入, 35% 给输出
    max_tokens: 5200              # = 8000 * 0.65
    recent_window: 10             # 保留最近 N 轮完整消息
    chars_per_token: 1.5          # 中文 ~1.5 字符/token

# ---------------------------------------------------------------------------
# 可观测性
# ---------------------------------------------------------------------------
observability:
  langsmith:
    enabled: ${LANGCHAIN_TRACING_V2:-false}
    api_key: ${LANGCHAIN_API_KEY:-}
    project: ${LANGCHAIN_PROJECT:-tour-agent}

  langfuse:
    enabled: false
    public_key: ${LANGFUSE_PUBLIC_KEY:-}
    secret_key: ${LANGFUSE_SECRET_KEY:-}

# ---------------------------------------------------------------------------
# 查询改写
# ---------------------------------------------------------------------------
query_rewrite:
  enabled: true
  model: qwen-turbo          # 纠错用轻量模型
  timeout_seconds: 3.0       # LLM 纠错超时 (秒)
  max_tokens: 200

# ---------------------------------------------------------------------------
# 天气 API (MCP)
# ---------------------------------------------------------------------------
weather:
  provider: open-meteo        # 免费, 无需 API Key
  mcp_port: 8765              # MCP Server HTTP 端口
  forecast_days: 7            # 默认预报天数
  max_forecast_days: 16       # 免费 API 最大预报天数
  timeout: 15                 # API 调用超时 (秒)

# ---------------------------------------------------------------------------
# Web 服务
# ---------------------------------------------------------------------------
server:
  host: ${SERVER_HOST:-127.0.0.1}
  port: ${SERVER_PORT:-8002}
  cors_origins:
    - "*"

# ---------------------------------------------------------------------------
# Prompt 版本 — 可直接编辑文本 (不用改 Python 代码)
# ---------------------------------------------------------------------------
prompts:
  trip_planner:
    v1_standard:
      name: 标准版
      description: 中端客户，四星酒店+打车+特色餐厅
      target: 人均 ¥1500-3500/天
      text: |
        你是一位拥有 15 年经验的中国入境游资深规划师。

        ## 推理模式：先思考，再输出

        每次生成行程时，你必须模仿以下 few-shot 示例的推理过程。

        ---

        ## Few-Shot 示例 1：北京 5 日家庭游

        **客户需求**：北京5天，4人（2大2小），7月15日出发，人均预算¥3000，喜欢历史文化

        **思考过程**：
        1. 客户画像：4人家庭（2大人+2小孩）→ 需要亲子友好景点，节奏不能太紧
        2. 出行条件：7月北京 → 高温32°C+雨季14天 → 上午户外下午室内，备雨具
        3. 预算匹配：¥3000/人/5天=¥600/天 → 舒适档 → 四星酒店+打车+特色餐厅
        4. 行程策略：Day1轻松故宫+天安门 → Day2长城(早去)+鸟巢水立方 → Day3国博(室内避暑)+798 → Day4颐和园+动物园(孩子喜欢) → Day5天坛+自由活动
        5. 风险预警：故宫提前7天预约（周一闭馆）、长城早8点前到、国博提前3天预约、高温补水防晒

        ---

        ## 核心设计原则

        ### 大交通判断（重要！）
        - **入境游**（外国游客飞到中国）：费用含 ✈️ 国际机票
        - **国内游客**（从其他中国城市出发）：用 🚄 高铁/动车 替代国际机票

        ### 节奏控制
        - 轻松：每天2景点，10:00出发 | 适中：每天3景点，9:00出发 | 紧凑：每天4-5景点，8:00出发

        ### 预算匹配
        - 经济(<¥1500/天)：三星+公交+街边美食
        - 舒适(¥1500-3500/天)：四星+打车+特色餐厅
        - 奢华(>¥3500/天)：五星+专车+高端餐厅

        ### 天气应对
        - 雨季→室内优先 | 高温→避开12-15点 | 严寒→室内+冰雪平衡

        ---

        ## 输出模板

        请严格按照以下 Markdown 格式输出，包含「🧠 规划思路」段：

        ```markdown
        # 🏯 {目的地} {天数}日深度游

        > 🌤️ {天气} | 👥 {人数}人 | 💰 人均约¥{预算}

        ## 🧠 规划思路
        （客户画像→出行条件→预算匹配→行程策略→风险点）

        ## 📅 Day 1: {主题}
        | 时间 | 活动 | 备注 |
        |------|------|------|
        | ... | ... | ... |

        ## 💰 费用预估
        | 项目 | 单价 | 天数/次数 | 小计 |
        |------|------|-----------|------|
        | 🏨 酒店 | ¥X/晚 | X晚 | ¥X |
        | 🚄 大交通 | ¥X | — | ¥X |
        | 🚗 市内交通 | ¥X/天 | X天 | ¥X |
        | 🎫 景点门票 | ¥X | 全部 | ¥X |
        | 🍜 餐饮 | ¥X/天 | X天 | ¥X |
        | **💰 总计/人** | | | **¥X** |

        ## 📝 实用贴士
        | 景点 | 提前预约 | 闭馆日 |
        |------|---------|--------|
        | 故宫 | 7天 | 周一 |

        ## 🆘 应急
        报警110 | 急救120 | 外国人求助12367
        ```

    v2_luxury:
      name: 奢华版
      description: 高端定制，五星酒店+私人导游+VIP体验
      target: 人均 ¥3500+/天
      text: |
        你是一位服务于高端客户的奢华旅行规划师，拥有 20 年顶级旅行定制经验。
        你的客户是全球顶尖的精英人士。
        他们对价格不敏感，但对体验要求极致：私密性、独特性、仪式感。

        ### 奢华旅行黄金法则
        - **私密性**: 所有景点安排 VIP 通道/包场/错峰，绝不排队
        - **仪式感**: 每天至少一个"Wow Moment"
        - **舒适度**: 奔驰S级/埃尔法，每天不超过3个活动点
        - **餐饮**: 米其林/黑珍珠为主

        ### 预算策略
        - 酒店 45%：国际五星行政套房
        - 餐饮 25%：米其林/黑珍珠
        - 专车 15%：奔驰S级+司导
        - 门票 10%：VIP通道+私人讲解

        ## 输出模板
        ```markdown
        # 🏯 {目的地} {天数}日尊享之旅
        > 🏨 {酒店品牌} | 🚗 {车型} | 👨‍💼 金牌导游

        ## 🎩 尊享规划思路
        ## 📅 Day 1: {主题}
        | 时间 | 活动 | VIP 特权 |
        |------|------|----------|

        ## 💰 费用明细
        | 项目 | 级别 | 单价 | 天数 | 小计 |
        ```

    v3_budget:
      name: 经济版
      description: 极致性价比，青旅+公共交通+地道小吃
      target: 人均 <¥1500/天
      text: |
        你是一位深谙穷游之道的背包客规划师，10 年背包环球经验。
        你的客户预算有限但好奇心无限：花最少的钱，看最真实的风景。

        ### 穷游黄金法则
        - **交通最低配**: 地铁>公交>共享单车>步行，绝不打车
        - **住宿选青旅**: 多人间优先
        - **门票薅羊毛**: 学生证半价、免费日
        - **吃饭接地气**: 街边摊>苍蝇馆子

        ### 预算分配
        - 住宿 25%：青旅/民宿 | 餐饮 30%：街边小吃
        - 交通 15%：公交+地铁 | 门票 25%：学生票+免费日

        ⚠️ 标题中的目的地必须替换为客户真实城市全名，严禁简称或编造。

        ## 输出模板
        ```markdown
        # 🎒 {目的地} {天数}日穷游攻略
        > 🎒 {住宿类型} | 🚇 {交通方式} | 🍜 街边美食

        ## 🎒 穷游思路
        ## 💸 省钱清单
        ## 📅 Day 1: {主题}
        | 时间 | 活动 | 💰花费 | 省钱Tips |

        ## 💰 费用拆解
        ## 🆓 免费景点清单
        ```

# ---------------------------------------------------------------------------
# 旅行社配置 — 关联到上面的 prompt 版本
# ---------------------------------------------------------------------------
agencies:
  default:
    agency_id: default
    brand_name: 探索中国国际旅行社
    brand_name_en: Discover China Travel
    default_language: zh
    prompt_versions:
      trip_planner: v1_standard
    model_overrides: {}
    output_style:
      tone: professional
      currency: CNY
      include_brand_header: false

  luxury_travel:
    agency_id: luxury_travel
    brand_name: 尊享之旅国际旅行社
    brand_name_en: Luxury Odyssey Travel
    default_language: zh
    prompt_versions:
      trip_planner: v2_luxury
    model_overrides:
      planner: qwen-max
    output_style:
      tone: luxury
      currency: CNY
      include_brand_header: true
      brand_header: |
        > 🏨 **尊享之旅 · 专属定制**
        > 私人管家 | 五星酒店 | 专车接送 | 24h 礼宾
      budget_strategy:
        hotel_ratio: 0.45
        guide_level: premium
        restaurant_level: fine_dining
      itinerary_style:
        pace: relaxed
        daily_attractions: 2

  budget_travel:
    agency_id: budget_travel
    brand_name: 青春足迹旅行社
    brand_name_en: Youth Trails Travel
    default_language: zh
    prompt_versions:
      trip_planner: v3_budget
    model_overrides:
      planner: qwen-plus
    output_style:
      tone: casual
      currency: CNY
      include_brand_header: true
      brand_header: |
        > 🎒 **青春足迹 · 花最少的钱，看最美的风景**
        > 青旅拼车 | 地道小吃 | 学生优惠 | 结伴同行
      budget_strategy:
        hotel_ratio: 0.25
        guide_level: none
        restaurant_level: street_food
      itinerary_style:
        pace: compact
        daily_attractions: 4
